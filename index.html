<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Basic Force Academy</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Hind+Siliguri:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#06090f;--bg2:#0b1221;--bg3:#0e1828;--card:#0d1a2b;
  --c1:#00e5ff;--c2:#0055ff;--c3:#8b5cf6;--gold:#fbbf24;--green:#34d399;--red:#f87171;
  --t1:#e2f0ff;--t2:#7bacc8;--t3:#2d4a62;
  --bdr:rgba(0,229,255,.09);--bdrh:rgba(0,229,255,.28);
  --glow:0 0 18px rgba(0,229,255,.3);
  --font:'Hind Siliguri',sans-serif;--mono:'Share Tech Mono',monospace;
  --bnav:60px; /* bottom nav height */
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--t1);overflow:hidden}
::-webkit-scrollbar{width:4px} ::-webkit-scrollbar-thumb{background:var(--c3);border-radius:4px}

/* grid bg */
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(rgba(0,229,255,.025) 1px,transparent 1px),
                   linear-gradient(90deg,rgba(0,229,255,.025) 1px,transparent 1px);
  background-size:60px 60px;}

/* ── TOP HEADER ─────────────────────────────── */
#hdr{position:fixed;top:0;left:0;right:0;height:52px;z-index:100;
  background:rgba(6,9,15,.97);border-bottom:1px solid var(--bdr);
  display:flex;align-items:center;padding:0 16px;gap:12px}
.logo{width:32px;height:32px;background:linear-gradient(135deg,var(--c1),var(--c2));
  border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.1rem}
.brand{font-family:var(--mono);font-size:.82rem;font-weight:700;color:var(--c1);
  text-shadow:var(--glow);flex:1}
.brand small{color:var(--t3);font-size:.6rem;display:block;font-weight:400}
.hbtn{padding:6px 13px;border-radius:8px;font-size:.74rem;cursor:pointer;
  font-family:var(--font);transition:.18s;border:1px solid;background:rgba(139,92,246,.12);
  border-color:rgba(139,92,246,.28);color:var(--c3)}
.hbtn:hover{background:rgba(139,92,246,.22)}

/* ── MAIN CONTENT ───────────────────────────── */
#cnt{position:fixed;top:52px;left:0;right:0;bottom:var(--bnav);overflow-y:auto;z-index:1}

/* ── BOTTOM NAV ─────────────────────────────── */
#bnav{position:fixed;bottom:0;left:0;right:0;height:var(--bnav);z-index:100;
  background:rgba(6,9,15,.97);border-top:1px solid var(--bdr);
  display:flex;align-items:stretch;overflow-x:auto;overflow-y:hidden;
  scrollbar-width:none}
#bnav::-webkit-scrollbar{display:none}
.bnav-item{display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:0 14px;gap:4px;cursor:pointer;transition:all .18s;border-bottom:2px solid transparent;
  flex-shrink:0;min-width:72px;white-space:nowrap}
.bnav-item:hover{background:rgba(0,229,255,.04);border-bottom-color:rgba(0,229,255,.3)}
.bnav-item.active{background:rgba(0,229,255,.07);border-bottom-color:var(--c1)}
.bnav-icon{font-size:1.25rem;line-height:1}
.bnav-label{font-family:var(--mono);font-size:.58rem;color:var(--t2);letter-spacing:.04em}
.bnav-item.active .bnav-label{color:var(--c1)}

/* ── TOPIC DRAWER ───────────────────────────── */
#drawer{position:fixed;bottom:var(--bnav);left:0;right:0;z-index:200;
  background:rgba(11,18,33,.98);border-top:1px solid var(--bdr);
  max-height:55vh;overflow-y:auto;transform:translateY(100%);transition:transform .25s ease;
  padding:14px 16px 18px}
#drawer.open{transform:translateY(0)}
.drawer-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.drawer-title{font-family:var(--mono);font-size:.78rem;color:var(--c1);font-weight:700}
.drawer-close{width:28px;height:28px;background:transparent;border:1px solid var(--bdr);
  border-radius:6px;cursor:pointer;color:var(--t2);font-size:.85rem;display:flex;
  align-items:center;justify-content:center;transition:.15s}
.drawer-close:hover{border-color:var(--bdrh);color:var(--c1)}
.topic-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}
.tcard{padding:11px 13px;background:var(--card);border:1px solid var(--bdr);border-radius:10px;
  cursor:pointer;transition:all .18s}
.tcard:hover{border-color:var(--bdrh);background:rgba(0,229,255,.05)}
.tcard h4{font-size:.84rem;font-weight:600;margin-bottom:2px}
.tcard em{font-size:.69rem;color:var(--t3);font-style:normal}

/* ── WELCOME ────────────────────────────────── */
.welcome{padding:28px 20px;min-height:100%;display:flex;flex-direction:column;align-items:center}
.atom{width:90px;height:90px;margin:0 auto 18px;position:relative;display:flex;align-items:center;justify-content:center}
.orbit{position:absolute;border-radius:50%;border:1px solid rgba(0,229,255,.2);animation:spin linear infinite}
.orbit:nth-child(1){width:100%;height:100%;animation-duration:6s}
.orbit:nth-child(2){width:65%;height:65%;border-color:rgba(139,92,246,.2);animation-duration:4s;animation-direction:reverse}
.nucleus{position:relative;z-index:1;font-size:1.7rem}
@keyframes spin{to{transform:rotate(360deg)}}
.wh{text-align:center;max-width:480px;margin-bottom:30px}
.wh h1{font-family:var(--mono);font-size:clamp(1.2rem,4vw,1.8rem);font-weight:900;margin-bottom:8px}
.wh h1 b{color:var(--c1);text-shadow:var(--glow)}
.wh p{color:var(--t2);font-size:.87rem;line-height:1.75}
.wh .tag{font-family:var(--mono);font-size:.65rem;color:var(--c3);margin-top:6px;letter-spacing:.1em;display:block}
.hint-box{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:16px 18px;
  max-width:440px;width:100%;text-align:center}
.hint-box p{font-size:.85rem;color:var(--t2);line-height:1.7}
.hint-box .arr{font-size:1.4rem;margin-bottom:8px;display:block}
.subj-pills{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:20px;max-width:480px}
.spill{padding:7px 14px;background:var(--card);border:1px solid var(--bdr);border-radius:20px;
  font-size:.8rem;color:var(--t2);cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:6px}
.spill:hover{border-color:var(--bdrh);color:var(--c1);background:rgba(0,229,255,.05)}

/* ── TOPIC PAGE ─────────────────────────────── */
.tpage{padding:18px 18px 10px}
.tnav{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.bk{padding:5px 12px;background:var(--card);border:1px solid var(--bdr);border-radius:7px;
  font-size:.78rem;color:var(--t2);cursor:pointer;font-family:var(--font);transition:.18s}
.bk:hover{border-color:var(--bdrh);color:var(--c1)}
.bc{font-family:var(--mono);font-size:.64rem;color:var(--t3)}
.bc b{color:var(--c1)}

/* AI loading */
.aiload{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:13px}
.spinner{width:48px;height:48px;border:2px solid var(--bdr);border-top-color:var(--c1);
  border-right-color:var(--c3);border-radius:50%;animation:spin .85s linear infinite}
.aiload p{font-family:var(--mono);font-size:.76rem;color:var(--c1);text-align:center;line-height:1.9}
.aiload .eta{color:var(--c3);font-size:.67rem}

/* Hero */
.hero{background:var(--card);border:1px solid var(--bdr);border-radius:14px;padding:22px;
  margin-bottom:14px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--c2),var(--c1),var(--c3))}
.htags{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.htag{font-family:var(--mono);font-size:.62rem;padding:2px 8px;border-radius:20px;border:1px solid}
.tc1{color:var(--c1);border-color:rgba(0,229,255,.28);background:rgba(0,229,255,.06)}
.tc3{color:var(--c3);border-color:rgba(139,92,246,.28);background:rgba(139,92,246,.06)}
.tgold{color:var(--gold);border-color:rgba(251,191,36,.28);background:rgba(251,191,36,.06)}
.hbn{font-size:1.6rem;font-weight:700;line-height:1.2;margin-bottom:3px}
.hen{font-family:var(--mono);font-size:.8rem;color:var(--t2);margin-bottom:12px}
.hdef{font-size:.88rem;color:var(--t2);line-height:1.8;padding:11px;
  background:rgba(0,229,255,.04);border-radius:8px;border-left:3px solid var(--c1)}
.hdef-en{font-style:italic;font-size:.82rem;color:var(--t3);margin-top:6px}

/* Tabs */
.tabs{display:flex;gap:5px;margin-bottom:14px;flex-wrap:wrap}
.tb{padding:7px 13px;background:var(--card);border:1px solid var(--bdr);border-radius:8px;
  font-size:.78rem;color:var(--t2);cursor:pointer;transition:.18s;font-family:var(--font);white-space:nowrap}
.tb:hover{border-color:var(--bdrh);color:var(--c1)}
.tb.on{background:rgba(0,229,255,.08);border-color:var(--c1);color:var(--c1)}
.tc{display:none}.tc.on{display:block}

/* Sections */
.sec{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:18px;margin-bottom:12px}
.sh{display:flex;align-items:center;gap:8px;margin-bottom:13px}
.si{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0}
.ic{background:rgba(0,229,255,.1)}.iv{background:rgba(139,92,246,.1)}
.ig{background:rgba(52,211,153,.1)}.ip{background:rgba(248,113,113,.1)}.io{background:rgba(251,191,36,.1)}
.sec h2{font-family:var(--mono);font-size:.85rem;font-weight:700}
.body{font-size:.87rem;color:var(--t2);line-height:1.8}

/* Steps */
.steps{display:flex;flex-direction:column;gap:10px}
.step{display:flex;gap:10px;align-items:flex-start}
.snum{width:24px;height:24px;border-radius:50%;background:rgba(0,229,255,.1);border:1px solid rgba(0,229,255,.28);
  display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:.7rem;color:var(--c1);flex-shrink:0;margin-top:2px}
.sdtl strong{color:var(--t1);display:block;margin-bottom:2px;font-size:.87rem}
.sdtl p{font-size:.85rem;color:var(--t2);line-height:1.7}

/* Formulas */
.fbox{padding:13px;background:rgba(0,85,255,.06);border:1px solid rgba(0,85,255,.16);border-radius:8px;
  font-family:var(--mono);font-size:.9rem;color:var(--c1);text-align:center;margin:9px 0;word-break:break-all}
.fname{font-family:var(--mono);font-size:.65rem;color:var(--t3);margin-bottom:2px}
.fvar{font-size:.77rem;color:var(--t3);margin-top:4px}
.fact{padding:11px;background:rgba(251,191,36,.05);border:1px solid rgba(251,191,36,.15);
  border-radius:8px;font-size:.83rem;color:var(--t2);line-height:1.6;margin:8px 0}
.fact::before{content:'💡 '}

/* Math problems */
.mpb{background:rgba(0,0,0,.22);border-radius:10px;padding:15px;margin-bottom:10px;border:1px solid rgba(255,255,255,.04)}
.mpnum{font-family:var(--mono);font-size:.64rem;color:var(--c3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.09em}
.mpq{font-size:.87rem;color:var(--t1);line-height:1.7;margin-bottom:9px;font-weight:600}
.mpg{font-size:.8rem;color:var(--t3);margin-bottom:9px;font-family:var(--mono)}
.stvg{padding:6px 12px;background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.22);
  border-radius:7px;font-size:.76rem;color:var(--c3);cursor:pointer;font-family:var(--font);transition:.18s}
.stvg:hover{background:rgba(139,92,246,.2)}
.sbdy{display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--bdr)}
.sbdy.on{display:block}
.sstep{font-size:.85rem;color:var(--t2);line-height:1.72;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.sstep:last-of-type{border-bottom:none}
.sans{padding:8px 12px;background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.18);
  border-radius:7px;font-family:var(--mono);font-size:.84rem;color:var(--green);margin-top:8px}

/* Board */
.bgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.bi{padding:12px;background:rgba(0,0,0,.2);border-radius:8px;border:1px solid rgba(255,255,255,.04)}
.by{font-family:var(--mono);font-size:.64rem;color:var(--t3);margin-bottom:4px;text-transform:uppercase}
.btp{font-size:.79rem;color:var(--t1);margin-bottom:4px}
.bbar-w{height:4px;background:rgba(255,255,255,.08);border-radius:2px;margin-top:5px}
.bbar{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--c2),var(--c1))}
.bval{font-family:var(--mono);font-size:.62rem;color:var(--c1);margin-top:2px;text-align:right}
.ibadge{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;
  font-size:.75rem;font-family:var(--mono);margin-bottom:12px;border:1px solid}
.ih{background:rgba(0,229,255,.08);border-color:rgba(0,229,255,.25);color:var(--c1)}
.im{background:rgba(251,191,36,.08);border-color:rgba(251,191,36,.25);color:var(--gold)}

/* MCQ */
.mqi{background:rgba(0,0,0,.2);border-radius:10px;padding:15px;margin-bottom:10px;border:1px solid rgba(255,255,255,.04)}
.mqq{font-size:.87rem;color:var(--t1);line-height:1.7;margin-bottom:12px;font-weight:600}
.mqopts{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.mopt{padding:8px 12px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);
  border-radius:7px;font-size:.81rem;color:var(--t2);cursor:pointer;transition:.18s;text-align:left;font-family:var(--font)}
.mopt:hover{border-color:var(--bdrh);color:var(--c1)}
.mopt.ok{background:rgba(52,211,153,.09)!important;border-color:rgba(52,211,153,.35)!important;color:var(--green)!important}
.mopt.no{background:rgba(248,113,113,.09)!important;border-color:rgba(248,113,113,.28)!important;color:var(--red)!important}
.mopt.done{pointer-events:none}
.mqex{margin-top:10px;font-size:.81rem;color:var(--t2);line-height:1.65;padding:8px;
  background:rgba(0,229,255,.04);border-radius:7px;display:none}
.mqex.on{display:block}

/* Simulation */
.scon{background:rgba(0,0,0,.4);border-radius:12px;overflow:hidden;border:1px solid var(--bdr)}
#simCvs{width:100%;height:240px;display:block;background:#000}
.sctrl{padding:13px;background:var(--bg2);border-top:1px solid var(--bdr);display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end}
.sct{display:flex;flex-direction:column;gap:4px;min-width:105px}
.sct label{font-family:var(--mono);font-size:.62rem;color:var(--t3);text-transform:uppercase;letter-spacing:.07em}
.sct input[type=range]{width:100%;accent-color:var(--c1)}
.sval{font-family:var(--mono);font-size:.73rem;color:var(--c1)}
.sbtns{display:flex;gap:6px;margin-left:auto}
.sbtn{padding:7px 15px;border-radius:7px;border:1px solid;font-size:.78rem;cursor:pointer;font-family:var(--font);transition:.18s}
.sbr{background:var(--c1);color:var(--bg);border-color:var(--c1)}
.sbs{background:transparent;color:var(--t2);border-color:var(--bdr)}
.sbs:hover{border-color:var(--bdrh);color:var(--c1)}
.sinfo{padding:10px 14px;font-family:var(--mono);font-size:.72rem;color:var(--t3);border-top:1px solid var(--bdr);line-height:1.6}

/* Admin modal */
#adm{position:fixed;inset:0;z-index:5000;background:rgba(0,0,0,.82);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center}
#adm.on{display:flex}
.amod{width:min(620px,95vw);max-height:82vh;background:var(--bg3);border:1px solid var(--bdr);border-radius:16px;overflow:hidden;display:flex;flex-direction:column}
.amid{padding:16px 20px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between}
.amid h2{font-family:var(--mono);font-size:.92rem;color:var(--c1)}
.axbtn{width:28px;height:28px;border-radius:6px;background:transparent;border:1px solid var(--bdr);cursor:pointer;color:var(--t2);display:flex;align-items:center;justify-content:center}
.abdy{overflow-y:auto;padding:16px 20px;flex:1}
.asec{margin-bottom:20px}
.asec h3{font-family:var(--mono);font-size:.72rem;color:var(--t2);margin-bottom:12px;text-transform:uppercase;letter-spacing:.1em}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.frow.f1{grid-template-columns:1fr}
.af{display:flex;flex-direction:column;gap:4px}
.af label{font-family:var(--mono);font-size:.63rem;color:var(--t3);text-transform:uppercase;letter-spacing:.07em}
.af input,.af select,.af textarea{background:rgba(0,0,0,.3);border:1px solid var(--bdr);border-radius:7px;color:var(--t1);padding:7px 10px;font-family:var(--font);font-size:.83rem;outline:none;transition:.18s}
.af input:focus,.af select:focus{border-color:var(--bdrh)}
.af textarea{resize:vertical;min-height:65px}
.af select option{background:var(--bg3)}
.apb{padding:8px 18px;border-radius:8px;font-size:.82rem;cursor:pointer;font-family:var(--font);font-weight:600;transition:.18s}
.apb-p{background:var(--c1);color:var(--bg);border:none}
.apb-p:hover{transform:translateY(-1px);box-shadow:var(--glow)}
.cli{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;
  background:rgba(0,0,0,.2);border-radius:8px;margin-bottom:6px;border:1px solid rgba(255,255,255,.04)}
.cli h4{font-size:.84rem;font-weight:600;margin-bottom:1px}
.cli p{font-size:.71rem;color:var(--t3)}
.cli-pr{font-family:var(--mono);font-size:.86rem;color:var(--green);margin-right:10px;flex-shrink:0}
.cli-d{padding:3px 8px;background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.18);border-radius:5px;font-size:.7rem;color:var(--red);cursor:pointer;font-family:var(--font)}

/* note / error */
.erbox{padding:16px;background:rgba(248,113,113,.07);border:1px solid rgba(248,113,113,.18);border-radius:10px;color:#fca5a5;font-size:.86rem;line-height:1.65;text-align:center}
.note{padding:10px 14px;background:rgba(0,229,255,.06);border:1px solid rgba(0,229,255,.15);border-radius:8px;font-family:var(--mono);font-size:.7rem;color:var(--t2);line-height:1.6;margin-bottom:14px}
.note b{color:var(--c1)}

/* WhatsApp */
.wa{position:fixed;bottom:calc(var(--bnav) + 14px);right:16px;width:46px;height:46px;background:#25d366;
  border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.25rem;z-index:999;
  box-shadow:0 4px 16px rgba(37,211,102,.35);animation:wap 2.5s ease-in-out infinite}
@keyframes wap{0%,100%{box-shadow:0 4px 16px rgba(37,211,102,.35)}50%{box-shadow:0 4px 24px rgba(37,211,102,.6),0 0 0 4px rgba(37,211,102,.1)}}

@media(max-width:500px){
  .mqopts,.bgrid{grid-template-columns:1fr}
  .frow{grid-template-columns:1fr}
  .topic-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<!-- ── ADMIN MODAL ── -->
<div id="adm">
  <div class="amod">
    <div class="amid">
      <h2>⚙ ADMIN PANEL</h2>
      <button class="axbtn" onclick="closeAdm()">✕</button>
    </div>
    <div class="abdy">
      <div class="asec">
        <h3>🔑 Groq API Key</h3>
        <div class="note">
          <b>ফ্রি API:</b> <a href="https://console.groq.com" target="_blank" style="color:var(--c1)">console.groq.com</a> এ Sign Up করো → API Keys → Create → Copy করো।<br>
          সম্পূর্ণ ফ্রি। প্রতিদিন ১৪,৪০০ request।
        </div>
        <div class="frow f1">
          <div class="af">
            <label>Groq API Key (gsk_...)</label>
            <input id="aKey" type="password" placeholder="gsk_...">
          </div>
        </div>
        <button class="apb apb-p" onclick="saveKey()">✓ Key সেভ করো</button>
      </div>
      <div class="asec">

/* =====================================================
   GROQ API  — FREE, llama-3.3-70b-versatile
===================================================== */
async function callGroq(topic, subject){
  const prompt = `তুমি বাংলাদেশের সেরা বিজ্ঞান শিক্ষক। "${topic}" (${subject}) টপিক SSC/HSC শিক্ষার্থীদের জন্য explain করো।
ONLY valid JSON দাও, কোনো markdown বা backtick নয়:
{"title_bn":"বাংলায় নাম","title_en":"English name","class_level":"SSC বা HSC বা উভয়","importance":"HIGH বা MEDIUM বা LOW","definition_bn":"বাংলায় সংজ্ঞা ২-৩ বাক্য","definition_en":"English definition 1-2 sentences","explanation_steps":[{"step":"ধাপ নাম","detail":"বিস্তারিত বাংলায়"},{"step":"ধাপ নাম","detail":"বিস্তারিত"},{"step":"ধাপ নাম","detail":"বিস্তারিত"},{"step":"ধাপ নাম","detail":"বিস্তারিত"}],"formulas":[{"formula":"সূত্র","name":"নাম","variables":"চলকের বর্ণনা"}],"key_facts":["তথ্য ১","তথ্য ২","তথ্য ৩"],"real_examples":["উদাহরণ ১","উদাহরণ ২","উদাহরণ ৩"],"math_problems":[{"question":"প্রশ্ন বাংলায়","given":"দেওয়া আছে: ...","solution_steps":["ধাপ ১: ...","ধাপ ২: ...","ধাপ ৩: ..."],"answer":"উত্তর: ..."},{"question":"প্রশ্ন ২","given":"দেওয়া আছে: ...","solution_steps":["ধাপ ১: ...","ধাপ ২: ..."],"answer":"উত্তর: ..."}],"board_analysis":[{"year":"২০২৩","board":"ঢাকা","type":"সৃজনশীল","marks":10,"frequency":90},{"year":"২০২২","board":"রাজশাহী","type":"MCQ","marks":1,"frequency":85},{"year":"২০২১","board":"চট্টগ্রাম","type":"সৃজনশীল","marks":10,"frequency":80},{"year":"২০২০","board":"কুমিল্লা","type":"সৃজনশীল","marks":10,"frequency":75},{"year":"২০১৯","board":"যশোর","type":"MCQ","marks":1,"frequency":70}],"mcq_questions":[{"question":"প্রশ্ন ১","options":["ক) ...","খ) ...","গ) ...","ঘ) ..."],"correct":0,"explanation":"ব্যাখ্যা"},{"question":"প্রশ্ন ২","options":["ক) ...","খ) ...","গ) ...","ঘ) ..."],"correct":1,"explanation":"ব্যাখ্যা"},{"question":"প্রশ্ন ৩","options":["ক) ...","খ) ...","গ) ...","ঘ) ..."],"correct":2,"explanation":"ব্যাখ্যা"},{"question":"প্রশ্ন ৪","options":["ক) ...","খ) ...","গ) ...","ঘ) ..."],"correct":3,"explanation":"ব্যাখ্যা"},{"question":"প্রশ্ন ৫","options":["ক) ...","খ) ...","গ) ...","ঘ) ..."],"correct":0,"explanation":"ব্যাখ্যা"}],"simulation_type":"wave"}`;

  const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + KEY
    },
    body: JSON.stringify({
      model: 'llama-3.3-70b-versatile',  // best free model on Groq
      messages: [{ role: 'user', content: prompt }],
      temperature: 0.6,
      max_tokens: 3000
    })
  });

  if(!res.ok){
    const err = await res.json().catch(()=>({}));
    const msg = err?.error?.message || '';
    if(res.status===401) throw new Error('API Key ভুল। সঠিক Groq key দাও।');
    if(res.status===429) throw new Error('Rate limit — একটু পরে আবার চেষ্টা করো।');
    throw new Error('API Error ' + res.status + ': ' + msg);
  }

  const data = await res.json();
  let raw = data?.choices?.[0]?.message?.content || '';
  // strip any accidental markdown fences
  raw = raw.replace(/^```json\s*/i,'').replace(/```\s*$/,'').trim();
  // extract first JSON object in case of extra text
  const start = raw.indexOf('{');
  const end = raw.lastIndexOf('}');
  if(start !== -1 && end !== -1) raw = raw.slice(start, end+1);
  return JSON.parse(raw);
}

          <div class="fact">এই টপিক থেকে প্রতিবছরই সৃজনশীল ও MCQ উভয়তে প্রশ্ন আসে।</div></div>
      </div>
      <div class="tc" id="tc_mcq">
        <div class="sec"><div class="sh"><div class="si ig">✓</div><h2>MCQ Practice — ${(d.mcq_questions||[]).length} টি</h2></div>
          ${mcq}</div>
      </div>
      <div class="tc" id="tc_sim">
        <div class="sec"><div class="sh"><div class="si iv">⚗</div><h2>Interactive Simulation</h2></div>
          <div class="scon">
            <canvas id="simCvs"></canvas>
            <div class="sctrl" id="simCtrl"></div>
            <div class="sinfo" id="simInfo">▶ Start চাপো</div>
          </div></div>
      </div>
    </div>`;
}

function swT(n, btn){
  document.querySelectorAll('.tb').forEach(b=>b.classList.remove('on'));
  document.querySelectorAll('.tc').forEach(t=>t.classList.remove('on'));
  btn.classList.add('on');

/* =====================================================
   MCQ
===================================================== */
function chkMCQ(btn, oi, correct, expId){
  btn.closest('.mqopts').querySelectorAll('.mopt').forEach((o,i)=>{
    o.classList.add('done');
    if(i===correct) o.classList.add('ok');

}

function togSol(btn){
  const b = btn.nextElementSibling;
  b.classList.toggle('on');
  btn.textContent = b.classList.contains('on') ? '▾ লুকাও' : '✦ সমাধান দেখো';

/* =====================================================
   SIMULATION
===================================================== */
function bootSim(type){
  if(simRaf){ cancelAnimationFrame(simRaf); simRaf=null; }
  simRunning = false;
  const cvs = document.getElementById('simCvs');
  if(!cvs) return;
  const ctx = cvs.getContext('2d');
  cvs.width = cvs.clientWidth || 580;
  cvs.height = 240;

  if(type==='wave'||type==='motion') setupWave(cvs,ctx);
  else if(type==='molecular')        setupMol(cvs,ctx);
  else                               setupProj(cvs,ctx);
}

function grid(cvs,ctx){
  ctx.clearRect(0,0,cvs.width,cvs.height);
  ctx.fillStyle='#000'; ctx.fillRect(0,0,cvs.width,cvs.height);
  ctx.strokeStyle='rgba(0,229,255,.05)'; ctx.lineWidth=1;
  for(let x=0;x<cvs.width;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,cvs.height);ctx.stroke();}
  for(let y=0;y<cvs.height;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(cvs.width,y);ctx.stroke();}
}

/* Wave */
function setupWave(cvs,ctx){
  document.getElementById('simCtrl').innerHTML=`
    <div class="sct"><label>Amplitude <span class="sval" id="sv1">50</span></label>
      <input type="range" min="10" max="80" value="50" oninput="document.getElementById('sv1').textContent=this.value"></div>
    <div class="sct"><label>Frequency <span class="sval" id="sv2">1.0</span></label>
      <input type="range" min="5" max="30" value="10" oninput="document.getElementById('sv2').textContent=(this.value/10).toFixed(1)"></div>
    <div class="sbtns">
      <button class="sbtn sbr" onclick="simRunning=!simRunning;this.textContent=simRunning?'⏸ Pause':'▶ Start'">▶ Start</button>
    </div>`;
  document.getElementById('simInfo').textContent='▶ Start চাপো — তরঙ্গ দেখো';
  let ph=0;
  function draw(){
    simRaf=requestAnimationFrame(draw);
    if(!simRunning){grid(cvs,ctx);return;}
    const a=+document.querySelectorAll('#simCtrl input')[0].value;
    const f=+document.querySelectorAll('#simCtrl input')[1].value/10;
    const cy=cvs.height/2;
    grid(cvs,ctx);
    ctx.beginPath();ctx.strokeStyle='rgba(0,229,255,.2)';ctx.lineWidth=7;
    for(let x=0;x<cvs.width;x++){const y=cy-a*Math.sin(x*f*Math.PI*2/cvs.width*3+ph);x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}ctx.stroke();
    ctx.beginPath();ctx.strokeStyle='#00e5ff';ctx.lineWidth=2;
    for(let x=0;x<cvs.width;x++){const y=cy-a*Math.sin(x*f*Math.PI*2/cvs.width*3+ph);x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}ctx.stroke();
    ctx.beginPath();ctx.strokeStyle='rgba(0,229,255,.15)';ctx.lineWidth=1;ctx.moveTo(0,cy);ctx.lineTo(cvs.width,cy);ctx.stroke();
    ph+=0.06;
    document.getElementById('simInfo').textContent=`Amplitude=${a} | Frequency=${f}Hz | তরঙ্গ সামনে এগিয়ে যাচ্ছে`;
  }
  draw();
}

/* Projectile */
function setupProj(cvs,ctx){
  document.getElementById('simCtrl').innerHTML=`
    <div class="sct"><label>বেগ v₀ (m/s) <span class="sval" id="pv1">20</span></label>
      <input type="range" min="5" max="50" value="20" oninput="document.getElementById('pv1').textContent=this.value"></div>
    <div class="sct"><label>কোণ θ° <span class="sval" id="pv2">45</span></label>
      <input type="range" min="10" max="80" value="45" oninput="document.getElementById('pv2').textContent=this.value"></div>
    <div class="sct"><label>g (m/s²) <span class="sval" id="pv3">9.8</span></label>
      <input type="range" min="1" max="20" step=".1" value="9.8" oninput="document.getElementById('pv3').textContent=parseFloat(this.value).toFixed(1)"></div>
    <div class="sbtns"><button class="sbtn sbr" onclick="launchProj()">▶ Launch</button></div>`;
  document.getElementById('simInfo').textContent='বেগ ও কোণ সেট করো, Launch চাপো';
  grid(cvs,ctx);
}

function launchProj(){
  if(simRaf){cancelAnimationFrame(simRaf);simRaf=null;}
  const cvs=document.getElementById('simCvs');const ctx=cvs.getContext('2d');
  const v0=+document.querySelectorAll('#simCtrl input')[0].value;
  const ang=+document.querySelectorAll('#simCtrl input')[1].value*Math.PI/180;
  const g=+document.querySelectorAll('#simCtrl input')[2].value;
  const sc=cvs.width/110,ox=30,oy=cvs.height-28;
  const vx=v0*Math.cos(ang),vy=v0*Math.sin(ang),tT=2*vy/g;
  const trail=[];let t=0,dt=tT/65;
  document.getElementById('simInfo').textContent=`Range: ${(vx*tT).toFixed(1)}m | Max H: ${(vy*vy/(2*g)).toFixed(1)}m | Time: ${tT.toFixed(1)}s`;
  function draw(){
    grid(cvs,ctx);
    ctx.beginPath();ctx.strokeStyle='rgba(0,229,255,.12)';ctx.lineWidth=1;
    for(let tt=0;tt<=tT;tt+=tT/80){const px=ox+vx*tt*sc,py=oy-(vy*tt-0.5*g*tt*tt)*sc;tt===0?ctx.moveTo(px,py):ctx.lineTo(px,py);}ctx.stroke();
    const cx=ox+vx*t*sc,cy=oy-(vy*t-0.5*g*t*t)*sc;
    trail.push({x:cx,y:cy});
    trail.forEach((p,i)=>{ctx.beginPath();ctx.arc(p.x,p.y,2,0,Math.PI*2);ctx.fillStyle=`rgba(0,229,255,${i/trail.length*.45})`;ctx.fill();});
    ctx.beginPath();ctx.arc(cx,cy,7,0,Math.PI*2);ctx.fillStyle='rgba(0,229,255,.2)';ctx.fill();
    ctx.beginPath();ctx.arc(cx,cy,3.5,0,Math.PI*2);ctx.fillStyle='#00e5ff';ctx.fill();
    ctx.fillStyle='rgba(0,229,255,.55)';ctx.font='10px Share Tech Mono';ctx.fillText(`t=${t.toFixed(1)}s`,cx+8,cy-7);
    t+=dt;
    if(t<=tT) simRaf=requestAnimationFrame(draw); else simRaf=null;
  }
  simRaf=requestAnimationFrame(draw);
}

/* Molecular */
function setupMol(cvs,ctx){
  document.getElementById('simCtrl').innerHTML=`
    <div class="sct"><label>Temperature <span class="sval" id="mv1">300</span>K</label>
      <input type="range" min="50" max="1000" value="300" oninput="document.getElementById('mv1').textContent=this.value"></div>
    <div class="sbtns"><button class="sbtn sbr" onclick="simRunning=!simRunning;this.textContent=simRunning?'⏸ Pause':'▶ Start'">▶ Start</button></div>`;
  document.getElementById('simInfo').textContent='Temperature বাড়াও — অণুর গতি পর্যবেক্ষণ করো';
  const mols=Array.from({length:20},()=>({x:Math.random()*(cvs.width-40)+20,y:Math.random()*(cvs.height-40)+20,vx:(Math.random()-.5)*2,vy:(Math.random()-.5)*2,r:Math.random()*4+3}));
  function draw(){
    simRaf=requestAnimationFrame(draw);
    if(!simRunning){grid(cvs,ctx);return;}
    const temp=+document.querySelectorAll('#simCtrl input')[0].value;
    const sp=Math.sqrt(temp/300);
    grid(cvs,ctx);
    mols.forEach(m=>{
      m.x+=m.vx*sp;m.y+=m.vy*sp;
      if(m.x<m.r||m.x>cvs.width-m.r)m.vx*=-1;
      if(m.y<m.r||m.y>cvs.height-m.r)m.vy*=-1;
      const col=temp>700?'#f97316':temp>400?'#fbbf24':'#00e5ff';
      const g2=ctx.createRadialGradient(m.x,m.y,0,m.x,m.y,m.r*2);
      g2.addColorStop(0,col);g2.addColorStop(1,'transparent');
      ctx.beginPath();ctx.arc(m.x,m.y,m.r,0,Math.PI*2);ctx.fillStyle=g2;ctx.fill();
    });
    document.getElementById('simInfo').textContent=`T=${temp}K | KE ∝ T | তাপ বাড়লে গতিশক্তি বাড়ে`;
  }
  draw();
}

   ADMIN
===================================================== */
function openAdm(){
  document.getElementById('adm').classList.add('on');
  document.getElementById('aKey').value=KEY;
  renderCList();
}
function closeAdm(){ document.getElementById('adm').classList.remove('on'); }
function saveKey(){
  const k=document.getElementById('aKey').value.trim();
  if(!k){alert('Key দাও!');return;}
  KEY=k;localStorage.setItem('bfa_key',k);
  alert('✓ Groq API Key সেভ হয়েছে! এখন যেকোনো topic লোড করো।');
  closeAdm();
}
function addCourse(){
  const c={id:Date.now(),name:document.getElementById('acN').value,subject:document.getElementById('acS').value,
    cls:document.getElementById('acC').value,price:document.getElementById('acP').value||0,
    video:document.getElementById('acV').value,desc:document.getElementById('acD').value,
    date:new Date().toLocaleDateString('bn-BD')};
  if(!c.name){alert('নাম দাও!');return;}
  const arr=JSON.parse(localStorage.getItem('bfa_courses')||'[]');
  arr.push(c);localStorage.setItem('bfa_courses',JSON.stringify(arr));
  ['acN','acP','acV','acD'].forEach(i=>document.getElementById(i).value='');
  renderCList();alert('✓ কোর্স যোগ হয়েছে!');
}
function renderCList(){
  const arr=JSON.parse(localStorage.getItem('bfa_courses')||'[]');
  const el=document.getElementById('cList');
  if(!arr.length){el.innerHTML='<p style="font-size:.81rem;color:var(--t3)">কোনো কোর্স নেই।</p>';return;}
  el.innerHTML=arr.map(c=>`
    <div class="cli">
      <div style="flex:1"><h4>${c.name}</h4><p>${c.cls} | ${c.subject} | ${c.date}</p></div>
      <span class="cli-pr">${c.price>0?'৳'+c.price:'FREE'}</span>
      <button class="cli-d" onclick="delC(${c.id})">✕</button>
    </div>`).join('');
}
function delC(id){
  if(!confirm('মুছবেন?'))return;
  const arr=JSON.parse(localStorage.getItem('bfa_courses')||'[]').filter(c=>c.id!==id);
  localStorage.setItem('bfa_courses',JSON.stringify(arr));renderCList();
}
