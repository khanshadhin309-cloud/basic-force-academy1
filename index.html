<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Basic Force Academy — Science Universe</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Hind+Siliguri:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#020810;--bg2:#050e18;--bg3:#091525;--card:rgba(5,14,28,0.95);
  --c1:#00f5ff;--c2:#0066ff;--c3:#7b2fff;--c4:#ff006a;--gold:#ffcc00;--green:#00ff88;
  --t1:#e8f4ff;--t2:#7ab0cc;--t3:#2d5572;
  --border:rgba(0,245,255,0.08);--bh:rgba(0,245,255,0.3);
  --glow:0 0 20px rgba(0,245,255,0.35);
  --fb:'Hind Siliguri',sans-serif;--fd:'Orbitron',monospace;--fm:'Share Tech Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--fb);background:var(--bg);color:var(--t1);overflow:hidden}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:var(--c1);border-radius:2px}

/* === CANVAS BG === */
#bgCanvas{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0.4}

/* === LOADING === */
#loader{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px}
.loader-ring{width:80px;height:80px;border:2px solid var(--border);border-top-color:var(--c1);border-radius:50%;animation:spin 1s linear infinite;position:relative}
.loader-ring::before{content:'';position:absolute;inset:8px;border:2px solid var(--border);border-bottom-color:var(--c3);border-radius:50%;animation:spin 1.5s linear infinite reverse}
.loader-text{font-family:var(--fd);font-size:.75rem;color:var(--c1);letter-spacing:.2em;animation:pulse 1.5s ease-in-out infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}

/* === LAYOUT === */
#app{display:flex;height:100vh;position:relative;z-index:1}

/* === SIDEBAR === */
#sidebar{width:260px;background:rgba(5,14,28,0.97);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:width .3s;flex-shrink:0}
#sidebar.collapsed{width:0}
.sidebar-head{padding:16px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.sidebar-logo{width:36px;height:36px;background:linear-gradient(135deg,var(--c1),var(--c2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
.sidebar-brand{font-family:var(--fd);font-size:.7rem;font-weight:700;color:var(--c1);letter-spacing:.05em;line-height:1.3}
.sidebar-brand span{color:var(--t2);font-weight:400;font-size:.6rem;display:block}
.sidebar-scroll{flex:1;overflow-y:auto;padding:10px 0}
.subject-group{}
.subject-header{padding:10px 14px 6px;font-family:var(--fm);font-size:.62rem;color:var(--t3);text-transform:uppercase;letter-spacing:.12em;border-top:1px solid var(--border);margin-top:6px;cursor:pointer;display:flex;align-items:center;gap:6px}
.subject-header:first-child{border-top:none;margin-top:0}
.subject-header .sh-icon{font-size:.85rem}
.subject-header .sh-arr{margin-left:auto;transition:.2s;font-size:.7rem}
.subject-header.open .sh-arr{transform:rotate(90deg)}
.topic-list{display:none;flex-direction:column}
.subject-header.open + .topic-list{display:flex}
.topic-item{padding:8px 14px 8px 28px;font-size:.83rem;color:var(--t2);cursor:pointer;transition:all .2s;border-left:2px solid transparent;display:flex;align-items:center;justify-content:space-between}
.topic-item:hover{color:var(--c1);background:rgba(0,245,255,0.04);border-left-color:var(--c1)}
.topic-item.active{color:var(--c1);background:rgba(0,245,255,0.08);border-left-color:var(--c1)}
.topic-item .ti-sub{font-size:.68rem;color:var(--t3)}
.subtopic-list{display:none;flex-direction:column;background:rgba(0,0,0,0.2)}
.topic-item.has-sub.open + .subtopic-list{display:flex}
.subtopic-item{padding:7px 14px 7px 42px;font-size:.78rem;color:var(--t3);cursor:pointer;transition:all .2s}
.subtopic-item:hover,.subtopic-item.active{color:var(--c1);background:rgba(0,245,255,0.05)}

/* === MAIN === */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* === HEADER === */
#header{padding:14px 20px;background:rgba(5,14,28,0.97);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0;position:relative}
.menu-btn{width:36px;height:36px;background:transparent;border:1px solid var(--border);border-radius:8px;cursor:pointer;color:var(--t2);font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.menu-btn:hover{border-color:var(--bh);color:var(--c1)}
.header-brand{font-family:var(--fd);font-size:.95rem;font-weight:900;color:var(--c1);white-space:nowrap;text-shadow:var(--glow)}

/* === HOLOGRAPHIC SEARCH BAR === */
.search-wrap{flex:1;max-width:600px;position:relative}
.search-outer{position:relative;border-radius:14px;background:rgba(0,245,255,0.03);border:1px solid var(--bh);overflow:hidden;transition:all .3s}
.search-outer::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(0,245,255,0.04),transparent);background-size:200% 100%;animation:scanline 3s linear infinite;pointer-events:none}
@keyframes scanline{0%{background-position:-200% 0}100%{background-position:200% 0}}
.search-outer:focus-within{border-color:var(--c1);box-shadow:0 0 30px rgba(0,245,255,0.2),inset 0 0 20px rgba(0,245,255,0.03)}
.search-inner{display:flex;align-items:center;padding:10px 16px;gap:10px}
.search-icon{font-size:1rem;color:var(--c1);animation:searchPulse 2s ease-in-out infinite}
@keyframes searchPulse{0%,100%{text-shadow:none}50%{text-shadow:0 0 10px var(--c1)}}
#searchInput{flex:1;background:transparent;border:none;outline:none;color:var(--t1);font-size:.9rem;font-family:var(--fb)}
#searchInput::placeholder{color:var(--t3);font-size:.85rem}
.search-meta{display:flex;align-items:center;gap:8px;flex-shrink:0}
.search-time{font-family:var(--fm);font-size:.68rem;color:var(--c3);background:rgba(123,47,255,0.1);padding:3px 8px;border-radius:20px;border:1px solid rgba(123,47,255,0.2);white-space:nowrap;display:none}
.search-time.show{display:block}
.search-btn{padding:6px 14px;background:var(--c1);color:var(--bg);border:none;border-radius:8px;font-size:.8rem;font-weight:700;cursor:pointer;font-family:var(--fb);transition:all .2s;white-space:nowrap}
.search-btn:hover{transform:translateY(-1px);box-shadow:var(--glow)}
.search-suggestions{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--bg3);border:1px solid var(--border);border-radius:12px;z-index:100;display:none;flex-direction:column;overflow:hidden;max-height:280px;overflow-y:auto}
.search-suggestions.show{display:flex}
.sug-item{padding:10px 16px;font-size:.85rem;color:var(--t2);cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .2s}
.sug-item:hover{background:rgba(0,245,255,0.06);color:var(--c1)}
.sug-tag{font-family:var(--fm);font-size:.65rem;color:var(--t3);background:var(--bg2);padding:2px 7px;border-radius:10px}

.header-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
.admin-btn{padding:6px 14px;background:rgba(123,47,255,0.15);border:1px solid rgba(123,47,255,0.3);border-radius:8px;color:var(--c3);font-size:.75rem;cursor:pointer;font-family:var(--fb);transition:all .2s}
.admin-btn:hover{background:rgba(123,47,255,0.25)}

/* === CONTENT === */
#content{flex:1;overflow-y:auto;padding:0}

/* === WELCOME === */
.welcome-page{padding:40px 30px;min-height:100%;display:flex;flex-direction:column;align-items:center}
.welcome-hero{text-align:center;margin-bottom:48px;max-width:600px}
.welcome-hologram{width:120px;height:120px;margin:0 auto 24px;position:relative}
.holo-ring{position:absolute;border-radius:50%;border:1px solid rgba(0,245,255,0.3);animation:holoSpin 4s linear infinite}
.holo-ring:nth-child(1){inset:0;border-color:rgba(0,245,255,0.4);animation-duration:3s}
.holo-ring:nth-child(2){inset:12px;border-color:rgba(0,102,255,0.3);animation-direction:reverse;animation-duration:5s}
.holo-ring:nth-child(3){inset:24px;border-color:rgba(123,47,255,0.3);animation-duration:7s}
.holo-core{position:absolute;inset:36px;background:radial-gradient(circle,rgba(0,245,255,0.2),transparent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2rem}
@keyframes holoSpin{to{transform:rotate(360deg)}}
.welcome-hero h1{font-family:var(--fd);font-size:clamp(1.4rem,4vw,2.2rem);font-weight:900;line-height:1.15;margin-bottom:10px}
.welcome-hero h1 span{color:var(--c1);text-shadow:var(--glow)}
.welcome-hero p{color:var(--t2);font-size:.9rem;line-height:1.7;margin-bottom:6px}
.welcome-hero .tagline{font-family:var(--fm);font-size:.72rem;color:var(--c3);letter-spacing:.1em}
.subject-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;width:100%;max-width:900px;margin-bottom:32px}
.subject-card{padding:20px;background:var(--card);border:1px solid var(--border);border-radius:16px;cursor:pointer;transition:all .3s;position:relative;overflow:hidden}
.subject-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent,rgba(0,245,255,0.03));opacity:0;transition:.3s}
.subject-card:hover{border-color:var(--bh);transform:translateY(-3px);box-shadow:0 8px 30px rgba(0,245,255,0.1)}
.subject-card:hover::before{opacity:1}
.sc-icon{font-size:2rem;margin-bottom:10px;display:block}
.sc-name{font-family:var(--fd);font-size:.8rem;font-weight:700;margin-bottom:4px;color:var(--c1)}
.sc-desc{font-size:.78rem;color:var(--t2);line-height:1.5}
.sc-count{font-family:var(--fm);font-size:.65rem;color:var(--t3);margin-top:8px}

/* === TOPIC PAGE === */
.topic-page{padding:24px}
.topic-nav{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.back-btn{padding:6px 14px;background:var(--card);border:1px solid var(--border);border-radius:8px;font-size:.8rem;color:var(--t2);cursor:pointer;font-family:var(--fb);transition:all .2s}
.back-btn:hover{border-color:var(--bh);color:var(--c1)}
.topic-breadcrumb{font-family:var(--fm);font-size:.68rem;color:var(--t3)}
.topic-breadcrumb span{color:var(--c1)}

/* Loading state */
.ai-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;gap:16px}
.ai-loader{width:60px;height:60px;position:relative}
.ai-loader::before,.ai-loader::after{content:'';position:absolute;border-radius:50%;border:2px solid transparent}
.ai-loader::before{inset:0;border-top-color:var(--c1);animation:spin .8s linear infinite}
.ai-loader::after{inset:8px;border-bottom-color:var(--c3);animation:spin 1.2s linear infinite reverse}
.ai-loading p{font-family:var(--fm);font-size:.78rem;color:var(--c1);text-align:center;line-height:1.8}
.ai-loading .eta{color:var(--c3);font-size:.7rem}

/* Topic header card */
.topic-hero{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:28px;margin-bottom:18px;position:relative;overflow:hidden}
.topic-hero::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--c2),var(--c1),var(--c3))}
.topic-hero::after{content:attr(data-en);position:absolute;right:20px;bottom:10px;font-family:var(--fd);font-size:4rem;font-weight:900;color:rgba(0,245,255,0.04);line-height:1;pointer-events:none;white-space:nowrap}
.topic-tags{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.topic-tag{font-family:var(--fm);font-size:.65rem;padding:3px 10px;border-radius:20px;border:1px solid}
.tag-class{color:var(--c1);border-color:rgba(0,245,255,0.3);background:rgba(0,245,255,0.08)}
.tag-subject{color:var(--c3);border-color:rgba(123,47,255,0.3);background:rgba(123,47,255,0.08)}
.tag-imp{color:var(--gold);border-color:rgba(255,204,0,0.3);background:rgba(255,204,0,0.08)}
.topic-title-bn{font-size:1.8rem;font-weight:700;line-height:1.2;margin-bottom:4px}
.topic-title-en{font-family:var(--fd);font-size:.85rem;color:var(--t2);margin-bottom:16px;font-weight:400}
.topic-definition{font-size:.92rem;color:var(--t2);line-height:1.8;padding:14px;background:rgba(0,245,255,0.04);border-radius:10px;border-left:3px solid var(--c1)}
.def-en{margin-top:8px;font-style:italic;color:var(--t3);font-size:.85rem}

/* Tabs */
.tabs{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap;padding:0 2px}
.tab-btn{padding:8px 16px;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:.8rem;color:var(--t2);cursor:pointer;transition:all .2s;font-family:var(--fb);white-space:nowrap}
.tab-btn:hover{border-color:var(--bh);color:var(--c1)}
.tab-btn.active{background:rgba(0,245,255,0.1);border-color:var(--c1);color:var(--c1)}
.tab-content{display:none}
.tab-content.active{display:block}

/* Section cards */
.sec-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:22px;margin-bottom:14px}
.sec-head{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.sec-icon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
.ico-cyan{background:rgba(0,245,255,0.1)}
.ico-violet{background:rgba(123,47,255,0.1)}
.ico-gold{background:rgba(255,204,0,0.1)}
.ico-green{background:rgba(0,255,136,0.1)}
.ico-pink{background:rgba(255,0,106,0.1)}
.sec-card h2{font-family:var(--fd);font-size:.95rem;font-weight:700}
.body-text{font-size:.9rem;color:var(--t2);line-height:1.8}
.body-text strong{color:var(--t1)}
.step-list{display:flex;flex-direction:column;gap:12px}
.step-item{display:flex;gap:12px;align-items:flex-start}
.step-num{width:28px;height:28px;border-radius:50%;background:rgba(0,245,255,0.1);border:1px solid rgba(0,245,255,0.3);display:flex;align-items:center;justify-content:center;font-family:var(--fm);font-size:.75rem;color:var(--c1);flex-shrink:0;margin-top:2px}
.step-item p{font-size:.88rem;color:var(--t2);line-height:1.7}
.formula-box{padding:18px;background:rgba(0,102,255,0.06);border:1px solid rgba(0,102,255,0.2);border-radius:10px;font-family:var(--fm);font-size:.95rem;color:var(--c1);text-align:center;margin:12px 0;letter-spacing:.03em;word-break:break-all}
.fact-box{padding:14px;background:rgba(255,204,0,0.06);border:1px solid rgba(255,204,0,0.2);border-radius:10px;font-size:.85rem;color:var(--t2);line-height:1.6;margin:10px 0}
.fact-box::before{content:'💡 ';font-size:.9rem}
.math-problem{background:rgba(0,0,0,0.3);border-radius:12px;padding:18px;margin-bottom:12px;border:1px solid rgba(255,255,255,0.05)}
.prob-num{font-family:var(--fm);font-size:.68rem;color:var(--c3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
.prob-q{font-size:.9rem;color:var(--t1);line-height:1.7;margin-bottom:12px;font-weight:500}
.sol-toggle{padding:6px 14px;background:rgba(123,47,255,0.1);border:1px solid rgba(123,47,255,0.25);border-radius:8px;font-size:.78rem;color:var(--c3);cursor:pointer;font-family:var(--fb);transition:all .2s}
.sol-toggle:hover{background:rgba(123,47,255,0.2)}
.sol-body{display:none;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
.sol-body.show{display:block}
.sol-step{font-size:.87rem;color:var(--t2);line-height:1.75;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.sol-step:last-child{border-bottom:none}
.sol-ans{padding:10px 14px;background:rgba(0,255,136,0.08);border:1px solid rgba(0,255,136,0.2);border-radius:8px;font-family:var(--fm);font-size:.88rem;color:var(--green);margin-top:10px}

/* Board Analysis */
.board-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.board-item{padding:14px;background:rgba(0,0,0,0.2);border-radius:10px;border:1px solid rgba(255,255,255,0.05)}
.board-year{font-family:var(--fm);font-size:.68rem;color:var(--t3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.08em}
.board-type{font-size:.82rem;color:var(--t1);margin-bottom:4px}
.board-freq{display:flex;align-items:center;gap:8px;margin-top:6px}
.freq-bar-wrap{flex:1;height:4px;background:rgba(255,255,255,0.1);border-radius:2px}
.freq-bar{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--c2),var(--c1))}
.freq-val{font-family:var(--fm);font-size:.65rem;color:var(--c1);flex-shrink:0}
.importance-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;font-size:.78rem;font-family:var(--fm);margin-bottom:14px}
.imp-high{background:rgba(0,245,255,0.1);border:1px solid rgba(0,245,255,0.3);color:var(--c1)}
.imp-med{background:rgba(255,204,0,0.1);border:1px solid rgba(255,204,0,0.3);color:var(--gold)}
.imp-low{background:rgba(123,47,255,0.1);border:1px solid rgba(123,47,255,0.3);color:var(--c3)}

/* MCQ */
.mcq-item{background:rgba(0,0,0,0.2);border-radius:12px;padding:18px;margin-bottom:12px;border:1px solid rgba(255,255,255,0.05)}
.mcq-q{font-size:.9rem;color:var(--t1);line-height:1.7;margin-bottom:14px;font-weight:500}
.mcq-options{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mcq-opt{padding:10px 14px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:8px;font-size:.83rem;color:var(--t2);cursor:pointer;transition:all .2s;text-align:left;font-family:var(--fb)}
.mcq-opt:hover{border-color:var(--bh);color:var(--c1)}
.mcq-opt.correct{background:rgba(0,255,136,0.1)!important;border-color:rgba(0,255,136,0.4)!important;color:var(--green)!important}
.mcq-opt.wrong{background:rgba(255,0,106,0.1)!important;border-color:rgba(255,0,106,0.3)!important;color:var(--c4)!important}
.mcq-opt.revealed{pointer-events:none}
.mcq-exp{margin-top:12px;font-size:.83rem;color:var(--t2);line-height:1.65;padding:10px;background:rgba(0,245,255,0.04);border-radius:8px;display:none}
.mcq-exp.show{display:block}

/* Simulation */
.sim-container{background:rgba(0,0,0,0.4);border-radius:14px;overflow:hidden;border:1px solid var(--border)}
.sim-canvas-wrap{position:relative;background:#000;width:100%;height:280px}
#simCanvas{width:100%;height:100%;display:block}
.sim-controls{padding:16px;background:var(--bg2);border-top:1px solid var(--border);display:flex;flex-wrap:wrap;gap:14px;align-items:flex-end}
.sim-control{display:flex;flex-direction:column;gap:5px;min-width:120px}
.sim-control label{font-family:var(--fm);font-size:.65rem;color:var(--t3);text-transform:uppercase;letter-spacing:.08em}
.sim-control input[type=range]{width:100%;accent-color:var(--c1)}
.sim-control input[type=number]{width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:6px;color:var(--t1);padding:5px 10px;font-family:var(--fm);font-size:.78rem;outline:none}
.sim-control input:focus{border-color:var(--bh)}
.sim-val{font-family:var(--fm);font-size:.78rem;color:var(--c1)}
.sim-btn-group{display:flex;gap:8px;margin-left:auto}
.sim-btn{padding:8px 18px;border-radius:8px;border:1px solid;font-size:.8rem;cursor:pointer;font-family:var(--fb);transition:all .2s}
.sim-btn-run{background:var(--c1);color:var(--bg);border-color:var(--c1)}
.sim-btn-reset{background:transparent;color:var(--t2);border-color:var(--border)}
.sim-btn-reset:hover{border-color:var(--bh);color:var(--c1)}
.sim-info{padding:14px 16px;background:rgba(0,245,255,0.03);border-top:1px solid var(--border);font-family:var(--fm);font-size:.75rem;color:var(--t3);line-height:1.6}

/* Holographic Visualization */
.holo-vis{width:100%;height:200px;background:rgba(0,0,0,0.5);border-radius:12px;margin-bottom:14px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.holo-vis canvas{position:absolute;inset:0;width:100%;height:100%}

function initBgCanvas() {
  const canvas = document.getElementById('bgCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const particles = Array.from({length:80}, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    vx: (Math.random() - 0.5) * 0.3,
    vy: (Math.random() - 0.5) * 0.3,
    r: Math.random() * 1.5 + 0.5,
    a: Math.random()
  }));
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      if(p.x < 0) p.x = canvas.width;
      if(p.x > canvas.width) p.x = 0;
      if(p.y < 0) p.y = canvas.height;
      if(p.y > canvas.height) p.y = 0;
      p.a += 0.01;
      const alpha = (Math.sin(p.a) + 1) / 2 * 0.4 + 0.1;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(0,245,255,${alpha})`;
      ctx.fill();
    });
    // Grid lines
    ctx.strokeStyle = 'rgba(0,245,255,0.03)';
    ctx.lineWidth = 1;
    for(let x=0; x<canvas.width; x+=60) {
      ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,canvas.height); ctx.stroke();
    }
    for(let y=0; y<canvas.height; y+=60) {
      ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(canvas.width,y); ctx.stroke();
    }
    requestAnimationFrame(draw);
  }
  draw();
  window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
}

    const matched = ALL_TOPICS_FLAT.filter(t =>
      t.name.includes(q) || t.en.toLowerCase().includes(q) || t.id.includes(q)
    ).slice(0,7);
    if(matched.length) {
      suggestions.innerHTML = matched.map(t => `
        <div class="sug-item" onclick="loadTopic('${t.id}','${t.subject}');document.getElementById('suggestions').classList.remove('show')">
          <span>◈</span>
          <span>${t.name}</span>
          <span class="sug-tag">${t.subject}</span>
        </div>`).join('');
      suggestions.classList.add('show');
    } else {
      // Free-form search
      suggestions.innerHTML = `
        <div class="sug-item" onclick="searchFreeForm('${val.replace(/'/g,"\\'")}');document.getElementById('suggestions').classList.remove('show')">
          <span>🔍</span>
          <span><strong style="color:var(--c1)">"${val}"</strong> — AI দিয়ে explain করুন</span>
          <span class="sug-tag">AI Search</span>
        </div>`;
      suggestions.classList.add('show');
    }
  }, 300);
}

function runSearch() {
  const val = document.getElementById('searchInput').value.trim();
  if(!val) return;
  document.getElementById('suggestions').classList.remove('show');
  const q = val.toLowerCase();
  const matched = ALL_TOPICS_FLAT.find(t =>
    t.name.includes(q) || t.en.toLowerCase().includes(q) || t.id.includes(q)
  );
  if(matched) { loadTopic(matched.id, matched.subject); }
  else { searchFreeForm(val); }
}

function searchFreeForm(query) {
  document.getElementById('searchInput').value = query;
  const content = document.getElementById('content');
  const start = Date.now();
  content.innerHTML = `
    <div class="topic-page">
      <div class="ai-loading">
        <div class="ai-loader"></div>
        <p>Gemini AI scanning the science universe...<br>
        <strong style="color:var(--c1)">"${query}"</strong> বিশ্লেষণ করা হচ্ছে</p>
        <p class="eta">⏱ সাধারণত ১০-১৮ সেকেন্ড লাগে</p>
      </div>
    </div>`;
  callGemini(query, 'general', start)
    .then(data => renderTopicPage(data, {name:query, en:query, subject:'Search Result'}))
    .catch(e => showError(e.message));
}

// ============================================================
// LOAD TOPIC
// ============================================================
function loadTopic(topicId, subjectName) {
  document.querySelectorAll('.topic-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('ti_' + topicId);
  if(el) el.classList.add('active');

  const subData = SYLLABUS[subjectName];
  const topic = subData?.topics.find(t => t.id === topicId);
  if(!topic) return;

  currentTopic = {topicId, subjectName, topic};
  const content = document.getElementById('content');
  const start = Date.now();

  content.innerHTML = `
    <div class="topic-page">
      <div class="topic-nav">
        <button class="back-btn" onclick="showWelcome()">← Home</button>
        <span class="topic-breadcrumb">${subjectName} / <span>${topic.name}</span></span>
      </div>
      <div class="ai-loading">
        <div class="ai-loader"></div>
        <p>Gemini AI loading deep content...<br>
        <strong style="color:var(--c1)">${topic.name}</strong> বিশ্লেষণ চলছে</p>
        <p class="eta">⏱ ১০-১৮ সেকেন্ড লাগবে...</p>
      </div>
    </div>`;

  if(!API_KEY) { showError('API Key সেট করুন! Admin panel এ যান (⚙ Admin বাটন)।'); return; }

  callGemini(topic.name + ' (' + topic.en + ')', subjectName, start)
    .then(data => renderTopicPage(data, topic, subjectName))
    .catch(e => showError(e.message));
}

// ============================================================
// GEMINI API CALL
// ============================================================
async function callGemini(topicName, subject, startTime) {

{
  "title_bn": "বাংলায় টপিকের নাম",

    {"step": "ধাপ ২ শিরোনাম", "detail": "বিস্তারিত ব্যাখ্যা..."},
    {"step": "ধাপ ৩ শিরোনাম", "detail": "বিস্তারিত ব্যাখ্যা..."},
    {"step": "ধাপ ৪ শিরোনাম", "detail": "বিস্তারিত ব্যাখ্যা..."}
  ],
  "formulas": [
    {"formula": "সূত্র বা সমীকরণ", "name": "সূত্রের নাম", "variables": "চলকের বর্ণনা"}
  ],
  "key_facts": ["গুরুত্বপূর্ণ তথ্য ১", "গুরুত্বপূর্ণ তথ্য ২", "গুরুত্বপূর্ণ তথ্য ৩"],
  "real_examples": ["বাস্তব উদাহরণ ১", "বাস্তব উদাহরণ ২", "বাস্তব উদাহরণ ৩"],
  "math_problems": [
    {
      "question": "গাণিতিক সমস্যা (বাংলায়)",
      "given": "দেওয়া আছে: ...",
      "solution_steps": ["ধাপ ১: ...", "ধাপ ২: ...", "ধাপ ৩: ..."],
      "answer": "উত্তর: ..."
    },
    {
      "question": "দ্বিতীয় গাণিতিক সমস্যা",
      "given": "দেওয়া আছে: ...",
      "solution_steps": ["ধাপ ১: ...", "ধাপ ২: ...", "ধাপ ৩: ..."],
      "answer": "উত্তর: ..."
    }
  ],
  "board_analysis": [
    {"year": "২০২৩", "board": "ঢাকা", "type": "সৃজনশীল", "marks": 10, "frequency": 90},
    {"year": "২০২২", "board": "রাজশাহী", "type": "MCQ", "marks": 1, "frequency": 85},
    {"year": "২০২১", "board": "চট্টগ্রাম", "type": "সৃজনশীল", "marks": 10, "frequency": 80},
    {"year": "২০২০", "board": "কুমিল্লা", "type": "সৃজনশীল", "marks": 10, "frequency": 75},
    {"year": "২০১৯", "board": "যশোর", "type": "MCQ ও সৃজনশীল", "marks": 11, "frequency": 95}
  ],
  "mcq_questions": [
    {"question": "MCQ প্রশ্ন ১", "options": ["ক) ...", "খ) ...", "গ) ...", "ঘ) ..."], "correct": 0, "explanation": "ব্যাখ্যা..."},

  ],
  "simulation_type": "motion/wave/circuit/molecular/graph",
  "simulation_params": {"param1": "value1", "param2": "value2"}
}`;

  const response = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`,
    {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        contents:[{parts:[{text:prompt}]}],
        generationConfig:{temperature:0.7, maxOutputTokens:2500}
      })
    }
  );
  if(!response.ok) {
    if(response.status === 401) throw new Error('API Key ভুল। Admin panel এ সঠিক key দিন।');

    throw new Error('API error: ' + response.status);
  }
  const data = await response.json();
  let raw = data.candidates[0].content.parts[0].text;
  raw = raw.replace(/```json/g,'').replace(/```/g,'').trim();
  const elapsed = ((Date.now() - startTime)/1000).toFixed(1);
  console.log(`Loaded in ${elapsed}s`);
  return JSON.parse(raw);
}

// ============================================================
// TABS
// ============================================================
function switchTab(name, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab_' + name)?.classList.add('active');
}

// ============================================================
// MCQ
// ============================================================
function checkMCQ(btn, qi, oi, correct, expId) {
  const parent = btn.closest('.mcq-options');
  const opts = parent.querySelectorAll('.mcq-opt');
  opts.forEach((o,i) => {
    o.classList.add('revealed');
    if(i === correct) o.classList.add('correct');
    else if(i === oi && oi !== correct) o.classList.add('wrong');
  });
  document.getElementById(expId)?.classList.add('show');
}

// ============================================================
// SOLUTION TOGGLE
// ============================================================
function toggleSolution(btn) {
  const body = btn.nextElementSibling;
  body.classList.toggle('show');
  btn.textContent = body.classList.contains('show') ? '▾ সমাধান লুকান' : '✦ সমাধান দেখুন';
}

// ============================================================
// SIMULATION ENGINE
// ============================================================
function initSimulation(type) {
  if(simInterval) { clearInterval(simInterval); simInterval = null; }
  const canvas = document.getElementById('simCanvas');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  const wrap = canvas.parentElement;
  canvas.width = wrap.clientWidth;
  canvas.height = wrap.clientHeight;

  const controls = document.getElementById('simControls');
  const info = document.getElementById('simInfo');

  if(type === 'motion' || type === 'wave') {
    runWaveSimulation(canvas, ctx, controls, info);
  } else if(type === 'circuit') {
    runCircuitSimulation(canvas, ctx, controls, info);
  } else if(type === 'molecular') {
    runMolecularSimulation(canvas, ctx, controls, info);
  } else {
    runProjectileSimulation(canvas, ctx, controls, info);
  }
}

function runProjectileSimulation(canvas, ctx, controls, info) {
  controls.innerHTML = `
    <div class="sim-control">
      <label>প্রাথমিক বেগ (m/s) <span class="sim-val" id="sv1">20</span></label>
      <input type="range" min="5" max="50" value="20" oninput="document.getElementById('sv1').textContent=this.value">
    </div>
    <div class="sim-control">
      <label>কোণ (°) <span class="sim-val" id="sv2">45</span></label>
      <input type="range" min="10" max="80" value="45" oninput="document.getElementById('sv2').textContent=this.value">
    </div>
    <div class="sim-control">
      <label>মাধ্যাকর্ষণ g (m/s²) <span class="sim-val" id="sv3">9.8</span></label>
      <input type="range" min="1" max="20" step="0.1" value="9.8" oninput="document.getElementById('sv3').textContent=parseFloat(this.value).toFixed(1)">
    </div>
    <div class="sim-btn-group">
      <button class="sim-btn sim-btn-run" onclick="startProjectile(this)">▶ Start</button>
      <button class="sim-btn sim-btn-reset" onclick="initSimulation('graph')">↺ Reset</button>
    </div>`;
  info.textContent = '▶ বেগ ও কোণ সেট করুন, তারপর Start চাপুন — projectile motion দেখুন';

  // Draw grid
  drawGrid(canvas, ctx);
}

function startProjectile(btn) {
  const canvas = document.getElementById('simCanvas');
  const ctx = canvas.getContext('2d');
  const v0 = parseFloat(document.querySelectorAll('#simControls input[type=range]')[0].value);
  const angle = parseFloat(document.querySelectorAll('#simControls input[type=range]')[1].value) * Math.PI / 180;
  const g = parseFloat(document.querySelectorAll('#simControls input[type=range]')[2].value);
  const info = document.getElementById('simInfo');

  const scale = canvas.width / 120;
  const originX = 20, originY = canvas.height - 30;
  const vx = v0 * Math.cos(angle), vy = v0 * Math.sin(angle);
  const tTotal = 2 * vy / g;
  const range = vx * tTotal;
  const maxH = vy * vy / (2 * g);

  info.textContent = `Range: ${range.toFixed(1)}m | Max Height: ${maxH.toFixed(1)}m | Time: ${tTotal.toFixed(1)}s`;

  if(simInterval) clearInterval(simInterval);
  let t = 0, dt = tTotal / 80;
  const trail = [];

  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawGrid(canvas, ctx);

  simInterval = setInterval(() => {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    drawGrid(canvas, ctx);

    // Draw trajectory
    ctx.beginPath();
    ctx.strokeStyle = 'rgba(0,245,255,0.2)'; ctx.lineWidth = 1;
    for(let tt=0; tt<=tTotal; tt+=tTotal/100) {
      const px = originX + vx*tt*scale;
      const py = originY - (vy*tt - 0.5*g*tt*tt)*scale;
      if(tt===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    }
    ctx.stroke();

    // Current position
    const cx = originX + vx*t*scale;
    const cy = originY - (vy*t - 0.5*g*t*t)*scale;
    trail.push({x:cx, y:cy});

    // Draw trail
    trail.forEach((p,i) => {
      const alpha = i / trail.length * 0.6;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 2, 0, Math.PI*2);
      ctx.fillStyle = `rgba(0,245,255,${alpha})`;
      ctx.fill();
    });

    // Draw ball
    const grad = ctx.createRadialGradient(cx,cy,0,cx,cy,10);
    grad.addColorStop(0,'rgba(0,245,255,1)');
    grad.addColorStop(1,'rgba(0,245,255,0)');
    ctx.beginPath();
    ctx.arc(cx, cy, 8, 0, Math.PI*2);
    ctx.fillStyle = grad; ctx.fill();
    ctx.beginPath();
    ctx.arc(cx, cy, 4, 0, Math.PI*2);
    ctx.fillStyle = '#00f5ff'; ctx.fill();

    // Labels
    ctx.fillStyle = 'rgba(0,245,255,0.6)'; ctx.font = '11px Share Tech Mono';
    ctx.fillText(`t=${t.toFixed(1)}s`, cx+8, cy-8);

    t += dt;
    if(t > tTotal) { clearInterval(simInterval); simInterval = null; }
  }, 50);
}

function runWaveSimulation(canvas, ctx, controls, info) {
  controls.innerHTML = `
    <div class="sim-control">
      <label>Amplitude <span class="sim-val" id="wv1">50</span></label>
      <input type="range" min="10" max="80" value="50" oninput="document.getElementById('wv1').textContent=this.value">
    </div>
    <div class="sim-control">
      <label>Frequency <span class="sim-val" id="wv2">1</span></label>
      <input type="range" min="0.5" max="5" step="0.1" value="1" oninput="document.getElementById('wv2').textContent=parseFloat(this.value).toFixed(1)">
    </div>
    <div class="sim-control">
      <label>Wave Type</label>
      <select id="waveType" onchange=""><option value="sin">Sine Wave</option><option value="cos">Cosine Wave</option><option value="square">Square Wave</option></select>
    </div>
    <div class="sim-btn-group">
      <button class="sim-btn sim-btn-run" onclick="startWave()">▶ Start</button>
      <button class="sim-btn sim-btn-reset" onclick="if(simInterval){clearInterval(simInterval);simInterval=null}drawGrid(document.getElementById('simCanvas'),document.getElementById('simCanvas').getContext('2d'))">↺ Stop</button>
    </div>`;
  info.textContent = '▶ তরঙ্গের amplitude ও frequency পরিবর্তন করে দেখুন';
  drawGrid(canvas, ctx);
  startWave();
}

function startWave() {
  if(simInterval) { clearInterval(simInterval); simInterval = null; }
  const canvas = document.getElementById('simCanvas');
  const ctx = canvas.getContext('2d');
  let phase = 0;
  simInterval = setInterval(() => {
    const amp = parseFloat(document.querySelectorAll('#simControls input[type=range]')[0]?.value || 50);
    const freq = parseFloat(document.querySelectorAll('#simControls input[type=range]')[1]?.value || 1);
    const wtype = document.getElementById('waveType')?.value || 'sin';
    ctx.clearRect(0,0,canvas.width,canvas.height);
    drawGrid(canvas, ctx);
    ctx.beginPath();
    ctx.strokeStyle = '#00f5ff'; ctx.lineWidth = 2.5;
    const centerY = canvas.height / 2;
    for(let x=0; x<canvas.width; x++) {
      const t = (x / canvas.width) * Math.PI * 2 * freq * 3;
      let y;
      if(wtype === 'sin') y = centerY - amp * Math.sin(t + phase);
      else if(wtype === 'cos') y = centerY - amp * Math.cos(t + phase);
      else y = centerY - amp * Math.sign(Math.sin(t + phase));
      if(x === 0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    }
    ctx.stroke();
    // Glow
    ctx.beginPath();
    ctx.strokeStyle = 'rgba(0,245,255,0.2)'; ctx.lineWidth = 6;
    for(let x=0; x<canvas.width; x++) {
      const t = (x / canvas.width) * Math.PI * 2 * freq * 3;
      const y = centerY - amp * Math.sin(t + phase);
      if(x===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    }
    ctx.stroke();
    phase += 0.08;
    document.getElementById('simInfo').textContent = `λ Amplitude: ${amp} | f: ${freq}Hz | Phase: ${(phase%6.28).toFixed(2)}rad`;
  }, 30);
}

function runMolecularSimulation(canvas, ctx, controls, info) {
  controls.innerHTML = `
    <div class="sim-control">
      <label>Temperature <span class="sim-val" id="mv1">300</span>K</label>
      <input type="range" min="100" max="1000" value="300" oninput="document.getElementById('mv1').textContent=this.value">
    </div>
    <div class="sim-btn-group">
      <button class="sim-btn sim-btn-run" onclick="startMolecular()">▶ Start</button>
      <button class="sim-btn sim-btn-reset" onclick="if(simInterval){clearInterval(simInterval);simInterval=null}">↺ Stop</button>
    </div>`;
  info.textContent = '▶ Temperature বাড়িয়ে অণুর গতি পর্যবেক্ষণ করুন';
  startMolecular();
}

function startMolecular() {
  if(simInterval) { clearInterval(simInterval); simInterval = null; }
  const canvas = document.getElementById('simCanvas');
  const ctx = canvas.getContext('2d');
  const N = 25;
  const molecules = Array.from({length:N}, () => ({
    x: Math.random() * (canvas.width-40) + 20,
    y: Math.random() * (canvas.height-40) + 20,
    vx: (Math.random()-0.5) * 3,
    vy: (Math.random()-0.5) * 3,
    r: Math.random() * 4 + 4,
    h: Math.random() * 360
  }));
  simInterval = setInterval(() => {
    const temp = parseFloat(document.querySelectorAll('#simControls input[type=range]')[0]?.value || 300);
    const speed = Math.sqrt(temp / 300) * 3;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    // dark background
    ctx.fillStyle = '#000'; ctx.fillRect(0,0,canvas.width,canvas.height);
    drawGrid(canvas, ctx);
    molecules.forEach(m => {
      m.x += m.vx * speed / 3;
      m.y += m.vy * speed / 3;
      if(m.x < m.r || m.x > canvas.width - m.r) m.vx *= -1;
      if(m.y < m.r || m.y > canvas.height - m.r) m.vy *= -1;
      const grad = ctx.createRadialGradient(m.x,m.y,0,m.x,m.y,m.r*2);
      const col = temp > 600 ? '#ff6600' : temp > 400 ? '#ffcc00' : '#00f5ff';
      grad.addColorStop(0, col);
      grad.addColorStop(1, 'transparent');
      ctx.beginPath();
      ctx.arc(m.x, m.y, m.r, 0, Math.PI*2);
      ctx.fillStyle = grad; ctx.fill();
      ctx.beginPath();
      ctx.arc(m.x, m.y, m.r/2, 0, Math.PI*2);
      ctx.fillStyle = '#fff'; ctx.globalAlpha = 0.6; ctx.fill();
      ctx.globalAlpha = 1;
    });
    document.getElementById('simInfo').textContent = `Temperature: ${temp}K | ${N} molecules | KE ∝ T`;
  }, 30);
}

function runCircuitSimulation(canvas, ctx, controls, info) {
  controls.innerHTML = `
    <div class="sim-control">
      <label>Voltage (V) <span class="sim-val" id="cv1">12</span></label>
      <input type="range" min="1" max="24" value="12" oninput="document.getElementById('cv1').textContent=this.value;updateCircuit()">
    </div>
    <div class="sim-control">
      <label>Resistance (Ω) <span class="sim-val" id="cv2">6</span></label>
      <input type="range" min="1" max="20" value="6" oninput="document.getElementById('cv2').textContent=this.value;updateCircuit()">
    </div>
    <div class="sim-btn-group">
      <button class="sim-btn sim-btn-run" onclick="startCircuit()">▶ Animate</button>
    </div>`;
  info.textContent = 'V=12V, R=6Ω → I=2A | Ohm\'s Law: V = IR';
  drawCircuitStatic(canvas, ctx, 12, 6);
}

function updateCircuit() {
  const canvas = document.getElementById('simCanvas');
  const ctx = canvas.getContext('2d');
  const v = parseFloat(document.querySelectorAll('#simControls input[type=range]')[0]?.value || 12);
  const r = parseFloat(document.querySelectorAll('#simControls input[type=range]')[1]?.value || 6);
  const i = (v/r).toFixed(2);
  document.getElementById('simInfo').textContent = `V=${v}V, R=${r}Ω → I=${i}A (Ohm's Law: V=IR)`;
  drawCircuitStatic(canvas, ctx, v, r);
}

function drawCircuitStatic(canvas, ctx, v, r) {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = '#000'; ctx.fillRect(0,0,canvas.width,canvas.height);
  const w=canvas.width, h=canvas.height;
  const mx=w/2, my=h/2, bw=w*0.6, bh=h*0.55;
  const x1=mx-bw/2, x2=mx+bw/2, y1=my-bh/2, y2=my+bh/2;
  ctx.strokeStyle='#00f5ff'; ctx.lineWidth=3;
  ctx.beginPath();
  ctx.moveTo(x1,y1); ctx.lineTo(x2,y1); ctx.lineTo(x2,y2); ctx.lineTo(x1,y2); ctx.closePath();
  ctx.stroke();
  // Battery
  ctx.fillStyle='#00f5ff'; ctx.font='12px Share Tech Mono';
  ctx.fillText(`⚡ ${v}V`, x1-5, my+16);
  // Resistor
  ctx.fillText(`Ω ${r}Ω`, mx-16, y1-8);
  // Current
  const i = (v/r).toFixed(2);
  ctx.fillStyle='#ffcc00';
  ctx.fillText(`I=${i}A →`, mx+20, my+16);
  ctx.fillStyle='rgba(0,245,255,0.15)'; ctx.fillRect(x1-30, my-12, 26, 24);
  ctx.fillStyle='rgba(255,204,0,0.15)'; ctx.fillRect(mx-30, y1-26, 60, 20);
}

function startCircuit() {
  if(simInterval) { clearInterval(simInterval); simInterval = null; }
  const canvas = document.getElementById('simCanvas');
  const ctx = canvas.getContext('2d');
  const w=canvas.width, h=canvas.height;
  const mx=w/2, my=h/2, bw=w*0.6, bh=h*0.55;
  const x1=mx-bw/2, x2=mx+bw/2, y1=my-bh/2, y2=my+bh/2;
  const v = parseFloat(document.querySelectorAll('#simControls input[type=range]')[0]?.value || 12);
  const r = parseFloat(document.querySelectorAll('#simControls input[type=range]')[1]?.value || 6);
  const speed = v / r * 20;
  const path = [
    ...Array.from({length:50},(_,i)=>({x:x1+i*(x2-x1)/50,y:y1})),
    ...Array.from({length:50},(_,i)=>({x:x2,y:y1+i*(y2-y1)/50})),
    ...Array.from({length:50},(_,i)=>({x:x2-(i*(x2-x1)/50),y:y2})),
    ...Array.from({length:50},(_,i)=>({x:x1,y:y2-i*(y2-y1)/50}))
  ];
  let pos = 0;
  simInterval = setInterval(() => {
    drawCircuitStatic(canvas, ctx, v, r);
    // Electrons
    for(let e=0; e<5; e++) {
      const idx = (Math.floor(pos) + e * 40) % path.length;
      const p = path[idx];
      ctx.beginPath();
      ctx.arc(p.x, p.y, 4, 0, Math.PI*2);
      ctx.fillStyle = '#ffcc00';
      ctx.shadowColor = '#ffcc00';
      ctx.shadowBlur = 10;
      ctx.fill();
      ctx.shadowBlur = 0;
    }
    pos = (pos + speed/10) % path.length;
  }, 30);
}

function drawGrid(canvas, ctx) {
  ctx.strokeStyle = 'rgba(0,245,255,0.06)'; ctx.lineWidth = 1;
  for(let x=0; x<canvas.width; x+=40) {
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,canvas.height); ctx.stroke();
  }
  for(let y=0; y<canvas.height; y+=40) {
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(canvas.width,y); ctx.stroke();
  }
  // Axes
  ctx.strokeStyle = 'rgba(0,245,255,0.2)'; ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(20,canvas.height-30); ctx.lineTo(canvas.width-10,canvas.height-30); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(20,10); ctx.lineTo(20,canvas.height-30); ctx.stroke();
}

function openAdmin() {
  document.getElementById('adminPanel').classList.add('show');
  document.getElementById('adminApiKey').value = API_KEY;
  renderCourseList();
}
function closeAdmin() { document.getElementById('adminPanel').classList.remove('show'); }

function saveApiKey() {
  const key = document.getElementById('adminApiKey').value.trim();
  if(!key) { alert('API key দাও!'); return; }
  API_KEY = key;
  localStorage.setItem('bfa_api_key', key);
  alert('✓ API Key সেভ হয়েছে!');
}

function addCourse() {
  const course = {
    id: Date.now(),
    name: document.getElementById('aCourseName').value,
    subject: document.getElementById('aSubject').value,
    class: document.getElementById('aClass').value,
    price: document.getElementById('aPrice').value,
    video: document.getElementById('aVideo').value,
    thumb: document.getElementById('aThumb').value,
    desc: document.getElementById('aDesc').value,
    createdAt: new Date().toLocaleDateString('bn-BD')
  };
  if(!course.name) { alert('কোর্সের নাম দাও!'); return; }
  const courses = JSON.parse(localStorage.getItem('bfa_courses') || '[]');
  courses.push(course);
  localStorage.setItem('bfa_courses', JSON.stringify(courses));
  ['aCourseName','aPrice','aVideo','aThumb','aDesc'].forEach(id => document.getElementById(id).value = '');
  renderCourseList();
  alert('✓ কোর্স যোগ হয়েছে!');
}

function renderCourseList() {
  const courses = JSON.parse(localStorage.getItem('bfa_courses') || '[]');
  const el = document.getElementById('courseList');
  if(!courses.length) { el.innerHTML = '<div style="font-size:.83rem;color:var(--t3);text-align:center;padding:20px">কোনো কোর্স নেই। উপরে যোগ করুন।</div>'; return; }
  el.innerHTML = courses.map(c => `
    <div class="course-list-item">
      <div class="cli-info">
        <h4>${c.name}</h4>
        <p>${c.class} | ${c.subject} | ${c.createdAt}</p>
      </div>
      <span class="cli-price">${c.price > 0 ? '৳'+c.price : 'FREE'}</span>
      <button class="cli-del" onclick="deleteCourse(${c.id})">✕</button>
    </div>`).join('');
}

function deleteCourse(id) {
  if(!confirm('এই কোর্স মুছবেন?')) return;
  const courses = JSON.parse(localStorage.getItem('bfa_courses') || '[]').filter(c => c.id !== id);
  localStorage.setItem('bfa_courses', JSON.stringify(courses));
  renderCourseList();
}
